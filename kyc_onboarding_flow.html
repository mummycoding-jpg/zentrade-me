
<style>
*{margin:0;padding:0;box-sizing:border-box;}
.wrap{background:#0f0f0f;border-radius:12px;border:0.5px solid #222;font-family:var(--font-sans);color:#fff;overflow:hidden;min-height:500px;}
.header{padding:14px 20px;border-bottom:0.5px solid #222;display:flex;align-items:center;justify-content:space-between;}
.back{color:#555;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px;}
.step-indicator{font-size:12px;color:#555;}
.step-indicator span{color:#fff;}
.progress-bar{height:3px;background:#1a1a1a;}
.progress-fill{height:100%;background:#00c985;transition:width 0.4s;}
.step-nav{display:flex;padding:16px 20px;gap:8px;border-bottom:0.5px solid #1a1a1a;overflow-x:auto;}
.step-dot{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;min-width:60px;}
.dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;border:0.5px solid #2a2a2a;background:#141414;color:#555;transition:all 0.2s;}
.dot.done{background:#00c98520;border-color:#00c985;color:#00c985;}
.dot.active{background:#378ADD20;border-color:#378ADD;color:#378ADD;}
.dot-label{font-size:10px;color:#555;white-space:nowrap;}
.dot.active+.dot-label{color:#378ADD;}
.dot.done+.dot-label{color:#00c985;}
.step-body{padding:20px;}
.step-title{font-size:16px;font-weight:500;margin-bottom:4px;}
.step-sub{font-size:12px;color:#555;margin-bottom:20px;}
.field{margin-bottom:14px;}
.field label{font-size:11px;color:#555;display:block;margin-bottom:6px;}
.field input,.field select{width:100%;background:#141414;border:0.5px solid #2a2a2a;border-radius:8px;padding:10px 14px;color:#fff;font-size:13px;font-family:var(--font-sans);outline:none;}
.field input:focus,.field select:focus{border-color:#378ADD;}
.field select option{background:#141414;}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.upload-box{border:0.5px dashed #2a2a2a;border-radius:10px;padding:24px;text-align:center;cursor:pointer;transition:border-color 0.2s;background:#141414;}
.upload-box:hover{border-color:#378ADD;}
.upload-icon{width:36px;height:36px;border-radius:8px;background:#378ADD20;display:flex;align-items:center;justify-content:center;margin:0 auto 10px;}
.upload-title{font-size:13px;color:#aaa;margin-bottom:4px;}
.upload-sub{font-size:11px;color:#555;}
.upload-done{border-color:#00c985;background:#00c98510;}
.upload-done .upload-title{color:#00c985;}
.otp-row{display:flex;gap:10px;justify-content:center;margin:16px 0;}
.otp-input{width:44px;height:50px;background:#141414;border:0.5px solid #2a2a2a;border-radius:8px;text-align:center;font-size:20px;color:#fff;font-family:var(--font-sans);outline:none;}
.otp-input:focus{border-color:#378ADD;}
.resend{font-size:12px;color:#555;text-align:center;margin-top:8px;}
.resend span{color:#378ADD;cursor:pointer;}
.consent-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:0.5px solid #1a1a1a;}
.consent-item:last-child{border-bottom:none;}
.checkbox{width:18px;height:18px;border-radius:4px;border:0.5px solid #2a2a2a;background:#141414;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:1px;}
.checkbox.checked{background:#00c98520;border-color:#00c985;}
.consent-text{font-size:12px;color:#aaa;line-height:1.6;}
.consent-link{color:#378ADD;cursor:pointer;}
.success-screen{padding:40px 20px;text-align:center;}
.success-icon{width:64px;height:64px;border-radius:50%;background:#00c98520;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;}
.success-title{font-size:18px;font-weight:500;margin-bottom:8px;}
.success-sub{font-size:13px;color:#555;line-height:1.6;margin-bottom:24px;}
.timeline{text-align:left;margin:0 0 24px;}
.tl-item{display:flex;gap:12px;margin-bottom:12px;}
.tl-dot{width:8px;height:8px;border-radius:50%;background:#00c985;margin-top:5px;flex-shrink:0;}
.tl-text{font-size:12px;color:#aaa;}
.tl-time{font-size:11px;color:#555;margin-top:2px;}
.footer{padding:16px 20px;border-top:0.5px solid #222;display:flex;gap:10px;}
.btn-back{flex:1;padding:12px;background:#141414;border:0.5px solid #2a2a2a;border-radius:10px;color:#aaa;font-size:14px;cursor:pointer;}
.btn-next{flex:2;padding:12px;background:#00c985;border:none;border-radius:10px;color:#000;font-size:14px;font-weight:500;cursor:pointer;}
.btn-next:disabled{background:#1a1a1a;color:#555;cursor:not-allowed;}
.info-box{background:#378ADD15;border:0.5px solid #378ADD30;border-radius:8px;padding:10px 14px;font-size:12px;color:#aaa;margin-bottom:14px;line-height:1.6;}
</style>

<div class="wrap">
  <div class="header">
    <div class="back" onclick="prevStep()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      Back
    </div>
    <div class="step-indicator">Step <span id="cur-step">1</span> of 6</div>
    <div style="width:40px;"></div>
  </div>

  <div class="progress-bar"><div class="progress-fill" id="progress" style="width:16%"></div></div>

  <div class="step-nav">
    <div class="step-dot"><div class="dot active" id="d1">1</div><div class="dot-label">Mobile</div></div>
    <div class="step-dot"><div class="dot" id="d2">2</div><div class="dot-label">PAN</div></div>
    <div class="step-dot"><div class="dot" id="d3">3</div><div class="dot-label">Aadhaar</div></div>
    <div class="step-dot"><div class="dot" id="d4">4</div><div class="dot-label">Bank</div></div>
    <div class="step-dot"><div class="dot" id="d5">5</div><div class="dot-label">Documents</div></div>
    <div class="step-dot"><div class="dot" id="d6">6</div><div class="dot-label">Done</div></div>
  </div>

  <div id="step-content"></div>

  <div class="footer" id="footer">
    <button class="btn-back" onclick="prevStep()">Back</button>
    <button class="btn-next" id="next-btn" onclick="nextStep()">Continue</button>
  </div>
</div>

<script>
let step = 1;
const totalSteps = 6;
const consents = {c1:false,c2:false,c3:false};
const uploads = {pan:false,aadhaar:false,selfie:false,bank:false};

const steps = {
  1: () => `
    <div class="step-body">
      <div class="step-title">Verify your mobile</div>
      <div class="step-sub">Enter your mobile number to get started</div>
      <div class="info-box">Your number will be used for transaction alerts and 2FA security.</div>
      <div class="field"><label>Mobile number</label><input type="tel" placeholder="+91 00000 00000" id="mobile"/></div>
      <div class="field"><label>Email address</label><input type="email" placeholder="you@example.com" id="email"/></div>
      <div class="field"><label>Create password</label><input type="password" placeholder="Min 8 characters"/></div>
    </div>`,

  2: () => `
    <div class="step-body">
      <div class="step-title">PAN verification</div>
      <div class="step-sub">Your PAN is required for SEBI compliance</div>
      <div class="field"><label>PAN number</label><input type="text" placeholder="ABCDE1234F" maxlength="10" style="text-transform:uppercase"/></div>
      <div class="field"><label>Full name (as per PAN)</label><input type="text" placeholder="Enter full name"/></div>
      <div class="field-row">
        <div class="field"><label>Date of birth</label><input type="date"/></div>
        <div class="field"><label>Father's name</label><input type="text" placeholder="Father's name"/></div>
      </div>
      <div class="upload-box ${uploads.pan?'upload-done':''}" onclick="toggleUpload('pan')" id="pan-upload">
        <div class="upload-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="${uploads.pan?'#00c985':'#378ADD'}" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg></div>
        <div class="upload-title">${uploads.pan?'PAN card uploaded':'Upload PAN card'}</div>
        <div class="upload-sub">JPG, PNG or PDF · Max 5MB</div>
      </div>
    </div>`,

  3: () => `
    <div class="step-body">
      <div class="step-title">Aadhaar verification</div>
      <div class="step-sub">Link your Aadhaar for identity verification</div>
      <div class="field"><label>Aadhaar number</label><input type="text" placeholder="0000 0000 0000" maxlength="14"/></div>
      <div class="field"><label>OTP sent to linked mobile</label></div>
      <div class="otp-row">
        <input class="otp-input" maxlength="1" type="text"/>
        <input class="otp-input" maxlength="1" type="text"/>
        <input class="otp-input" maxlength="1" type="text"/>
        <input class="otp-input" maxlength="1" type="text"/>
        <input class="otp-input" maxlength="1" type="text"/>
        <input class="otp-input" maxlength="1" type="text"/>
      </div>
      <div class="resend">Didn't get OTP? <span>Resend in 30s</span></div>
      <div style="margin-top:16px;" class="upload-box ${uploads.aadhaar?'upload-done':''}" onclick="toggleUpload('aadhaar')">
        <div class="upload-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="${uploads.aadhaar?'#00c985':'#378ADD'}" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="12" cy="10" r="3"/><path d="M7 21v-1a5 5 0 0 1 10 0v1"/></svg></div>
        <div class="upload-title">${uploads.aadhaar?'Aadhaar uploaded':'Upload Aadhaar card'}</div>
        <div class="upload-sub">Front and back · JPG or PDF</div>
      </div>
    </div>`,

  4: () => `
    <div class="step-body">
      <div class="step-title">Bank account</div>
      <div class="step-sub">Link your bank for withdrawals and deposits</div>
      <div class="field"><label>Account number</label><input type="text" placeholder="Enter account number"/></div>
      <div class="field"><label>Confirm account number</label><input type="text" placeholder="Re-enter account number"/></div>
      <div class="field"><label>IFSC code</label><input type="text" placeholder="e.g. HDFC0001234" style="text-transform:uppercase"/></div>
      <div class="field-row">
        <div class="field"><label>Bank name</label><input type="text" placeholder="Auto-filled" readonly style="color:#555"/></div>
        <div class="field"><label>Branch</label><input type="text" placeholder="Auto-filled" readonly style="color:#555"/></div>
      </div>
      <div class="upload-box ${uploads.bank?'upload-done':''}" onclick="toggleUpload('bank')">
        <div class="upload-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="${uploads.bank?'#00c985':'#378ADD'}" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg></div>
        <div class="upload-title">${uploads.bank?'Cheque uploaded':'Upload cancelled cheque'}</div>
        <div class="upload-sub">For bank verification · JPG or PDF</div>
      </div>
    </div>`,

  5: () => `
    <div class="step-body">
      <div class="step-title">Final documents</div>
      <div class="step-sub">Complete your KYC with a selfie and consent</div>
      <div class="upload-box ${uploads.selfie?'upload-done':''}" onclick="toggleUpload('selfie')" style="margin-bottom:14px;">
        <div class="upload-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="${uploads.selfie?'#00c985':'#378ADD'}" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg></div>
        <div class="upload-title">${uploads.selfie?'Selfie captured':'Take a live selfie'}</div>
        <div class="upload-sub">Hold your face steady in good lighting</div>
      </div>
      <div style="border:0.5px solid #222;border-radius:10px;padding:14px;">
        <div style="font-size:12px;color:#555;margin-bottom:10px;">Agreements & consent</div>
        <div class="consent-item">
          <div class="checkbox ${consents.c1?'checked':''}" onclick="toggleConsent('c1')" id="c1">
            ${consents.c1?'<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#00c985" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>':''}
          </div>
          <div class="consent-text">I agree to the <span class="consent-link">Terms & Conditions</span> and <span class="consent-link">Privacy Policy</span> of Zentrade.</div>
        </div>
        <div class="consent-item">
          <div class="checkbox ${consents.c2?'checked':''}" onclick="toggleConsent('c2')" id="c2">
            ${consents.c2?'<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#00c985" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>':''}
          </div>
          <div class="consent-text">I consent to my Aadhaar data being used for e-KYC as per UIDAI guidelines.</div>
        </div>
        <div class="consent-item">
          <div class="checkbox ${consents.c3?'checked':''}" onclick="toggleConsent('c3')" id="c3">
            ${consents.c3?'<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#00c985" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>':''}
          </div>
          <div class="consent-text">I declare that the information provided is true and correct to the best of my knowledge.</div>
        </div>
      </div>
    </div>`,

  6: () => `
    <div class="success-screen">
      <div class="success-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#00c985" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <div class="success-title">KYC submitted!</div>
      <div class="success-sub">Your documents are under review. You'll be notified within 24-48 hours.</div>
      <div class="timeline">
        <div class="tl-item"><div class="tl-dot" style="background:#00c985"></div><div><div class="tl-text">Documents submitted</div><div class="tl-time">Just now</div></div></div>
        <div class="tl-item"><div class="tl-dot" style="background:#EF9F27"></div><div><div class="tl-text">Verification in progress</div><div class="tl-time">Within 24 hours</div></div></div>
        <div class="tl-item"><div class="tl-dot" style="background:#2a2a2a"></div><div><div class="tl-text">Account activated</div><div class="tl-time">Within 48 hours</div></div></div>
      </div>
      <button class="btn-next" style="width:100%" onclick="sendPrompt('How do I implement the KYC verification backend API for my broker app using DigiLocker and UIDAI?')">Learn how to build KYC backend ↗</button>
    </div>`
};

function render() {
  document.getElementById('step-content').innerHTML = steps[step]();
  document.getElementById('cur-step').textContent = step;
  document.getElementById('progress').style.width = (step/totalSteps*100)+'%';
  for(let i=1;i<=totalSteps;i++){
    const d = document.getElementById('d'+i);
    d.className = 'dot'+(i<step?' done':i===step?' active':'');
  }
  const footer = document.getElementById('footer');
  footer.style.display = step===6 ? 'none' : 'flex';
  const nb = document.getElementById('next-btn');
  nb.textContent = step===5 ? 'Submit KYC' : 'Continue';
  setupOtp();
}

function setupOtp() {
  const inputs = document.querySelectorAll('.otp-input');
  inputs.forEach((inp,i) => {
    inp.addEventListener('input', () => { if(inp.value && i<inputs.length-1) inputs[i+1].focus(); });
    inp.addEventListener('keydown', e => { if(e.key==='Backspace'&&!inp.value&&i>0) inputs[i-1].focus(); });
  });
}

function nextStep() {
  if(step < totalSteps) { step++; render(); }
}

function prevStep() {
  if(step > 1) { step--; render(); }
}

function toggleUpload(key) {
  uploads[key] = !uploads[key];
  render();
}

function toggleConsent(key) {
  consents[key] = !consents[key];
  render();
}

render();
</script>
